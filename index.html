<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="topBar">
        <input id="urlInput" placeholder="Enter URL or search...">
        <button id="goBtn">Go</button>
        <button id="saveBtn">Save</button>
        <button id="openBtn">Menu</button>
        
        <div style="width: 2px; height: 20px; background: #333; margin: 0 5px;"></div>

        <button id="clckBtn">popt</button>
        <button id="vtprBtn">vew</button>

        <button id="abtBtn" class="active">abt</button>
        <button id="blbBtn">blb</button>

        <button class="modeBtn active" data-mode="iframe">IFR</button>
        <button class="modeBtn" data-mode="object">OBJ</button>
    </div>

    <div id="autocomplete"></div>

    <div id="searchContainer">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Bookmarks</h3>
            <button id="closeBtn">X</button>
        </div>
        
        <button id="hdeBtn" style="width: 100%; margin: 15px 0;">Hide UI (Ghost Mode)</button>

        <div id="savedSites"></div>
    </div>

    <div id="viewer"></div>

    <button id="mnuReveal">MENU</button>

    <script src="siteDB.js"></script>
    <script src="core.js"></script>
    <script src="menu.js"></script>
    <script src="autocomplete.js"></script>
    <script src="main.js"></script>

</body>
</html>
