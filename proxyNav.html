<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Proxy Navigator</title>

    <!-- Shared global stylesheet -->
    <link rel="stylesheet" href="../style.css">

    <style>
        /* Proxy-specific overrides (minimal) */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        #topBar {
            display: flex;
            gap: 6px;
            padding: 6px;
            background: #222;
            color: white;
            align-items: center;
        }

        #urlInput {
            flex: 1;
        }

        iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
        }
    </style>
</head>

<body>

    <!-- =============================== -->
    <!-- PROXY NAVIGATOR TOP BAR (UI)   -->
    <!-- =============================== -->
    <div id="topBar">
        <button id="goBtn">Go</button>
        <button id="saveBtn">Save</button>
        <button id="menuBtn">Menu</button>

        <!-- Shared autocomplete box -->
        <input id="urlInput" type="text" placeholder="Enter URL…">
        <div id="autocomplete"></div>
    </div>

    <!-- =============================== -->
    <!-- PROXY IFRAME                    -->
    <!-- =============================== -->
    <iframe id="view" src=""></iframe>

    <!-- =============================== -->
    <!-- PROXY NAV JS                    -->
    <!-- =============================== -->
    <script src="proxyNav.js"></script>

</body>
</html>
